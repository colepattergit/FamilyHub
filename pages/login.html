<!DOCTYPE html>
<!--
  ============================================================
  login.html — Family Hub · Login Screen
  ============================================================
  This is the GATE of the entire app. Every time the app
  opens it checks if a session exists. If not, it sends
  the user here before they can see any family data.
 
  The login flow works in two steps:
    Step 1 → Choose who you are (Cole or Maggie)
    Step 2 → Enter your PIN on a number pad
 
  If the PIN matches what is stored in Supabase for that
  user, a session is saved to the browser and you are
  sent to the home dashboard. The session persists so
  you never have to log in again on that device unless
  you manually log out from settings.
  ============================================================
-->
<html lang="en">
 
<head>
  <!-- ─────────────────────────────────────────────────────
    CHARACTER ENCODING
    UTF-8 supports all characters including Japanese kana.
    Must be the very first tag inside <head>.
  ───────────────────────────────────────────────────────── -->
  <meta charset="UTF-8" />
 
  <!-- ─────────────────────────────────────────────────────
    IPHONE VIEWPORT CONFIGURATION
    Makes the page fill the iPhone screen correctly.
    viewport-fit=cover extends content into the notch area.
  ───────────────────────────────────────────────────────── -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
 
  <!-- ─────────────────────────────────────────────────────
    WEB APP META TAGS
    Keeps the app looking native when saved to home screen.
  ───────────────────────────────────────────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="家族ハブ" />
 
  <title>家族ハブ — Login</title>
 
  <!-- ─────────────────────────────────────────────────────
    GOOGLE FONTS
    Same two fonts used across the whole app for consistency.
    Kaisei Decol → headings and title (Japanese serif feel)
    Noto Sans JP  → all UI text and labels
  ───────────────────────────────────────────────────────── -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />
 
  <!-- ─────────────────────────────────────────────────────
    SHARED STYLESHEET
    Links to the same style.css used by the whole app so
    colors, fonts, and base styles are consistent.
    Login-specific styles are written below in <style>.
  ───────────────────────────────────────────────────────── -->
  <link rel="stylesheet" href="../style.css" />
 
  <style>
    /* ======================================================
       LOGIN PAGE STYLES
       ======================================================
       All styles specific to the login screen. We use the
       same CSS custom properties (--color-*) defined in
       style.css so everything stays on-theme automatically.
       ====================================================== */
 
    /* ── PAGE BACKGROUND ───────────────────────────────────
       Full screen cream background with a subtle radial
       gradient to give depth. The gradient goes from a
       slightly warmer center outward to the standard cream.
       min-height: 100dvh uses the dynamic viewport height
       unit — on iPhone this accounts for the browser bar
       appearing and disappearing correctly.
    ────────────────────────────────────────────────────────── */
    .login-page {
      min-height: 100dvh;
      background: radial-gradient(ellipse at 50% 30%,
        #fef3e8 0%,
        var(--color-cream) 70%
      );
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top) 24px env(safe-area-inset-bottom);
      overflow: hidden;
      position: relative;
    }
 
    /* ── FLOATING PETAL DECORATIONS ────────────────────────
       Absolutely positioned petal shapes that sit behind
       all content. These are pure CSS shapes — no images.
       They give the screen a cherry blossom atmosphere.
    ────────────────────────────────────────────────────────── */
    .login-petal {
      position: absolute;
      border-radius: 50% 0 50% 0;
      opacity: 0.15;
      pointer-events: none; /* clicks pass through these */
    }
 
    /* Each petal has a unique size, color, position, and
       rotation to look naturally scattered */
    .login-petal:nth-child(1) {
      width: 80px; height: 80px;
      background: var(--color-sakura-400);
      top: 8%; left: -20px;
      transform: rotate(25deg);
    }
    .login-petal:nth-child(2) {
      width: 60px; height: 60px;
      background: var(--color-sakura-400);
      top: 15%; right: -10px;
      transform: rotate(-40deg);
    }
    .login-petal:nth-child(3) {
      width: 100px; height: 100px;
      background: var(--color-wisteria, #c4b5fd);
      bottom: 20%; left: -30px;
      transform: rotate(60deg);
    }
    .login-petal:nth-child(4) {
      width: 70px; height: 70px;
      background: var(--color-sakura-400);
      bottom: 12%; right: -15px;
      transform: rotate(-20deg);
    }
 
    /* ── APP TITLE SECTION ─────────────────────────────────
       The branding at the top of the login screen.
       Fades and slides in on page load via CSS animation.
    ────────────────────────────────────────────────────────── */
    .login-title-section {
      text-align: center;
      margin-bottom: 40px;
      animation: loginFadeUp 0.6s ease both;
    }
 
    /* The main Japanese title — same style as the dashboard */
    .login-app-title {
      font-family: 'Kaisei Decol', serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--color-bark-900);
      margin: 0 0 4px;
      letter-spacing: -0.5px;
    }
 
    /* Subtitle below the title */
    .login-app-subtitle {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 11px;
      font-weight: 500;
      color: var(--color-yuzu-700);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin: 0 0 12px;
    }
 
    /* Small decorative kana below subtitle */
    .login-kana {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: var(--color-sakura-400);
      opacity: 0.8;
    }
 
    /* ── MAIN LOGIN CARD ────────────────────────────────────
       The white card that contains both the user selection
       and PIN pad. It morphs between two states:
         State 1: showing Cole/Maggie selection buttons
         State 2: showing the PIN entry pad
    ────────────────────────────────────────────────────────── */
    .login-card {
      background: white;
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      max-width: 340px;
      box-shadow:
        0 4px 24px rgba(61, 35, 20, 0.08),
        0 1px 4px rgba(61, 35, 20, 0.04);
      animation: loginFadeUp 0.6s ease 0.15s both;
      /* 0.15s delay so title animates first, then card */
    }
 
    /* ── WHO ARE YOU SECTION ───────────────────────────────
       The first view inside the card — two large buttons
       for Cole and Maggie. Hidden once a user is selected.
    ────────────────────────────────────────────────────────── */
    .user-select-section {
      text-align: center;
    }
 
    /* Instruction text above the buttons */
    .user-select-label {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: var(--color-text-label, #8a7060);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0 0 20px;
    }
 
    /* Container for the two user buttons side by side */
    .user-buttons {
      display: flex;
      gap: 12px;
    }
 
    /* ── USER BUTTON ────────────────────────────────────────
       Each button is a large tappable card. flex: 1 makes
       both buttons equal width regardless of name length.
       The --user-color custom property is set inline on each
       button so each person can have their own accent color.
    ────────────────────────────────────────────────────────── */
    .user-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 20px 12px;
      background: var(--color-cream);
      border: 2px solid transparent;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      -webkit-tap-highlight-color: transparent;
      /* removes the grey flash on iPhone tap */
    }
 
    /* When tapped — scale down slightly for tactile feel */
    .user-btn:active {
      transform: scale(0.96);
    }
 
    /* The avatar circle above each name */
    .user-avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Kaisei Decol', serif;
      font-size: 22px;
      font-weight: 700;
      color: white;
      /* background color set inline via --user-color */
      background: var(--user-color);
    }
 
    /* The name below the avatar */
    .user-btn-name {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-bark-900);
    }
 
    /* ── PIN SECTION ────────────────────────────────────────
       The second view — shown after a user is selected.
       Hidden by default, revealed when a user taps their button.
    ────────────────────────────────────────────────────────── */
    .pin-section {
      display: none; /* hidden until user is selected */
      text-align: center;
    }
 
    /* Shows which user is currently logging in */
    .pin-greeting {
      font-family: 'Kaisei Decol', serif;
      font-size: 20px;
      color: var(--color-bark-900);
      margin: 0 0 4px;
    }
 
    /* Instruction to enter PIN */
    .pin-instruction {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      color: var(--color-text-label, #8a7060);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin: 0 0 24px;
    }
 
    /* ── PIN DOTS DISPLAY ───────────────────────────────────
       Five dots that fill in as the user enters each digit.
       We use 5 dots because the PIN is 5 digits (22622).
    ────────────────────────────────────────────────────────── */
    .pin-dots {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 28px;
    }
 
    /* Individual dot — hollow circle by default */
    .pin-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid var(--active-color, var(--color-sakura-400));
      background: transparent;
      transition: background 0.15s ease, transform 0.15s ease;
    }
 
    /* Filled state — when that digit has been entered */
    .pin-dot.filled {
      background: var(--active-color, var(--color-sakura-400));
      transform: scale(1.15); /* slight pop when filled */
    }
 
    /* ── ERROR STATE ────────────────────────────────────────
       When wrong PIN is entered, dots shake and turn red.
       The shake animation is defined in @keyframes below.
    ────────────────────────────────────────────────────────── */
    .pin-dots.error {
      animation: pinShake 0.4s ease;
    }
 
    .pin-dots.error .pin-dot.filled {
      background: #ef4444; /* red */
      border-color: #ef4444;
    }
 
    /* ── NUMBER PAD ─────────────────────────────────────────
       A 3x4 grid of buttons mimicking an iPhone passcode pad.
       Columns: 3 equal columns
       Rows: auto — filled by the 12 buttons (1-9, blank, 0, delete)
    ────────────────────────────────────────────────────────── */
    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      max-width: 280px;
      margin: 0 auto 20px;
    }
 
    /* ── NUMBER PAD BUTTON ──────────────────────────────────
       Each number button. Large enough for easy iPhone tapping
       (minimum 44px per Apple's Human Interface Guidelines,
       we use 64px for comfort).
    ────────────────────────────────────────────────────────── */
    .pin-key {
      height: 64px;
      border-radius: 50%;
      border: none;
      background: var(--color-cream);
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 22px;
      font-weight: 400;
      color: var(--color-bark-900);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
 
    /* Tap feedback — darkens slightly and scales down */
    .pin-key:active {
      background: var(--color-sakura-400);
      color: white;
      transform: scale(0.92);
    }
 
    /* Empty placeholder key (bottom-left of numpad) */
    .pin-key.empty {
      background: transparent;
      pointer-events: none; /* not tappable */
      cursor: default;
    }
 
    /* Delete key uses a slightly smaller font for the symbol */
    .pin-key.delete {
      font-size: 18px;
    }
 
    /* ── BACK BUTTON ────────────────────────────────────────
       Below the PIN pad — lets user go back to user selection
       if they tapped the wrong person.
    ────────────────────────────────────────────────────────── */
    .pin-back-btn {
      background: none;
      border: none;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 13px;
      color: var(--color-text-label, #8a7060);
      cursor: pointer;
      padding: 8px 16px;
      -webkit-tap-highlight-color: transparent;
    }
 
    /* ── ERROR MESSAGE ──────────────────────────────────────
       Small text that appears below PIN pad on wrong entry.
       Hidden by default, shown by JavaScript.
    ────────────────────────────────────────────────────────── */
    .pin-error-msg {
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 12px;
      color: #ef4444;
      min-height: 18px; /* reserves space so layout doesn't jump */
      margin-bottom: 8px;
    }
 
    /* ── ANIMATIONS ─────────────────────────────────────────
       loginFadeUp → elements slide up and fade in on load
       pinShake    → dots shake horizontally on wrong PIN
    ────────────────────────────────────────────────────────── */
    @keyframes loginFadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
 
    @keyframes pinShake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-5px); }
      80%       { transform: translateX(5px); }
    }
  </style>
</head>
 
<body>
 
  <!-- ═══════════════════════════════════════════════════════
    LOGIN PAGE WRAPPER
    Full screen container that centers everything vertically
    and horizontally. The login-page class handles all layout.
  ═══════════════════════════════════════════════════════════ -->
  <div class="login-page">
 
    <!-- Decorative background petals — purely visual -->
    <div class="login-petal"></div>
    <div class="login-petal"></div>
    <div class="login-petal"></div>
    <div class="login-petal"></div>
 
    <!-- ─────────────────────────────────────────────────
      APP TITLE SECTION
      Branding shown at the top of the login screen.
      Animates in first before the card appears.
    ───────────────────────────────────────────────────── -->
    <div class="login-title-section">
      <h1 class="login-app-title">家族ハブ</h1>
      <p class="login-app-subtitle">THE PATTERSONS</p>
      <span class="login-kana">ようこそ — Welcome</span>
      <!-- ようこそ = youkoso = welcome -->
    </div>
 
    <!-- ─────────────────────────────────────────────────
      LOGIN CARD
      The main interactive area. Contains two sections
      that swap visibility based on login state.
    ───────────────────────────────────────────────────── -->
    <div class="login-card">
 
      <!-- ── SECTION 1: USER SELECTION ──────────────────
        Shown first. Two buttons — one for each family member.
        Tapping a button saves who they are and reveals the PIN pad.
      ───────────────────────────────────────────────────── -->
      <div class="user-select-section" id="user-select">
        <p class="user-select-label">Who's signing in?</p>
 
        <div class="user-buttons">
 
          <!-- Cole's button
               --user-color sets this person's accent color inline
               data-user stores the database name (lowercase)
               data-display stores the friendly display name
               data-color stores the hex for use in PIN view -->
          <button
            class="user-btn"
            data-user="cole"
            data-display="Cole"
            data-color="#7dd3fc"
            onclick="selectUser(this)"
          >
            <div class="user-avatar" style="--user-color: #7dd3fc">C</div>
            <span class="user-btn-name">Cole</span>
          </button>
 
          <!-- Maggie's button — same structure, different color -->
          <button
            class="user-btn"
            data-user="maggie"
            data-display="Maggie"
            data-color="#f9a8c9"
            onclick="selectUser(this)"
          >
            <div class="user-avatar" style="--user-color: #f9a8c9">M</div>
            <span class="user-btn-name">Maggie</span>
          </button>
 
        </div>
      </div>
      <!-- end #user-select -->
 
      <!-- ── SECTION 2: PIN ENTRY ────────────────────────
        Hidden until a user is selected. Shows the person's
        name, five PIN dots, and the number pad.
      ───────────────────────────────────────────────────── -->
      <div class="pin-section" id="pin-section">
 
        <!-- Greeting changes to "Hi Cole!" or "Hi Maggie!" -->
        <p class="pin-greeting" id="pin-greeting">Hi!</p>
        <p class="pin-instruction">Enter your PIN</p>
 
        <!-- ── FIVE PIN DOTS ──────────────────────────────
          One dot per PIN digit. JavaScript fills them in
          as each number is tapped on the pad below.
          data-index tells JS which position this dot is.
        ─────────────────────────────────────────────────── -->
        <div class="pin-dots" id="pin-dots">
          <div class="pin-dot" data-index="0"></div>
          <div class="pin-dot" data-index="1"></div>
          <div class="pin-dot" data-index="2"></div>
          <div class="pin-dot" data-index="3"></div>
          <div class="pin-dot" data-index="4"></div>
        </div>
 
        <!-- Error message — empty until wrong PIN entered -->
        <p class="pin-error-msg" id="pin-error"></p>
 
        <!-- ── NUMBER PAD ─────────────────────────────────
          12 buttons in a 3-column grid:
          Row 1: 1  2  3
          Row 2: 4  5  6
          Row 3: 7  8  9
          Row 4: (empty)  0  (delete)
 
          Each number calls addDigit(n) with its value.
          Delete calls deleteDigit().
          The empty button is just a visual spacer.
        ─────────────────────────────────────────────────── -->
        <div class="pin-pad">
          <button class="pin-key" onclick="addDigit('1')">1</button>
          <button class="pin-key" onclick="addDigit('2')">2</button>
          <button class="pin-key" onclick="addDigit('3')">3</button>
          <button class="pin-key" onclick="addDigit('4')">4</button>
          <button class="pin-key" onclick="addDigit('5')">5</button>
          <button class="pin-key" onclick="addDigit('6')">6</button>
          <button class="pin-key" onclick="addDigit('7')">7</button>
          <button class="pin-key" onclick="addDigit('8')">8</button>
          <button class="pin-key" onclick="addDigit('9')">9</button>
          <button class="pin-key empty"></button>
          <!-- empty spacer — bottom left -->
          <button class="pin-key" onclick="addDigit('0')">0</button>
          <button class="pin-key delete" onclick="deleteDigit()">⌫</button>
          <!-- ⌫ is the backspace symbol -->
        </div>
 
        <!-- Back button — returns to user selection -->
        <button class="pin-back-btn" onclick="goBack()">
          ← Back
        </button>
 
      </div>
      <!-- end #pin-section -->
 
    </div>
    <!-- end .login-card -->
 
  </div>
  <!-- end .login-page -->
 
  <!-- ─────────────────────────────────────────────────────
    LOGIN SCRIPT
    type="module" lets us use import/export syntax.
    Placed at end of body so all HTML above is ready first.
  ───────────────────────────────────────────────────────── -->
  <script type="module">
 
    /* ========================================================
       IMPORT SUPABASE
       We go up one folder level (../) because login.html
       lives inside the pages/ folder, and supabase.js is
       in the root folder above it.
    ======================================================== */
    import { supabase } from '../supabase.js';
 
    /* ========================================================
       SESSION CHECK — SKIP LOGIN IF ALREADY LOGGED IN
       ========================================================
       When this page loads, the very first thing we do is
       check if there is already a saved session in the browser.
 
       localStorage is the browser's built-in storage that
       persists even after the app is closed. If we find a
       valid session saved there, we skip the whole login
       screen and send the user straight to the dashboard.
 
       This is what makes "remember this device" work —
       we save the session on first login and read it back
       every time the app opens.
    ======================================================== */
    const existingSession = localStorage.getItem('fh_user');
 
    if (existingSession) {
      /* A session exists — redirect to home without logging in */
      window.location.replace('../index.html');
    }
 
    /* ========================================================
       STATE VARIABLES
       ========================================================
       These two variables track the current state of the
       login process. They live outside the functions so all
       functions can read and update them.
 
       currentUser  → the database row for the selected user
                      null until a user button is tapped
       currentPIN   → the digits entered so far as a string
                      starts empty, grows as keys are tapped
    ======================================================== */
    let currentUser = null;  /* will hold { name, display_name, pin, color } */
    let currentPIN  = '';    /* builds up like '', '2', '22', '226', etc. */
 
    /* ========================================================
       MAKE FUNCTIONS GLOBAL
       ========================================================
       Our buttons use onclick="functionName()" in the HTML.
       For that to work the functions must be on the global
       window object. We assign them below after defining them.
    ======================================================== */
 
    /* ── selectUser ─────────────────────────────────────────
       Called when Cole or Maggie's button is tapped.
       button → the <button> element that was tapped
 
       It reads the data- attributes we put on the button,
       fetches that user's row from Supabase to confirm they
       exist, then switches the UI to show the PIN pad.
    ────────────────────────────────────────────────────────── */
    async function selectUser(button) {
      /* Read the data attributes from the tapped button */
      const userName    = button.dataset.user;    /* "cole" or "maggie" */
      const displayName = button.dataset.display; /* "Cole" or "Maggie" */
      const color       = button.dataset.color;   /* hex color string */
 
      /* ── FETCH USER FROM SUPABASE ──────────────────────
         Look up this user in the users table to confirm
         they exist and get their stored PIN for comparison.
         .single() returns one object instead of an array.
      ─────────────────────────────────────────────────── */
      const { data, error } = await supabase
        .from('users')
        .select('*')         /* get all columns */
        .eq('name', userName) /* where name = 'cole' or 'maggie' */
        .single();
 
      if (error || !data) {
        /* User not found in database — shouldn't happen but
           handle it gracefully just in case */
        alert('User not found. Please check Supabase setup.');
        return;
      }
 
      /* Save the user data so PIN checking functions can use it */
      currentUser = data;
 
      /* ── UPDATE PIN VIEW ─────────────────────────────────
         Set the greeting to "Hi Cole!" or "Hi Maggie!"
         Set the PIN dots color to match this user's color
         using a CSS custom property on the dots container.
      ─────────────────────────────────────────────────── */
      document.getElementById('pin-greeting').textContent = `Hi ${displayName}! 👋`;
      document.getElementById('pin-dots').style.setProperty('--active-color', color);
 
      /* ── SWAP THE VIEWS ──────────────────────────────────
         Hide the user selection section and show the PIN pad.
         We use display style directly for an instant swap.
      ─────────────────────────────────────────────────── */
      document.getElementById('user-select').style.display = 'none';
      document.getElementById('pin-section').style.display  = 'block';
 
      /* Reset PIN state in case user went back and returned */
      currentPIN = '';
      updateDots();
    }
 
    /* ── addDigit ────────────────────────────────────────────
       Called when any number key on the pad is tapped.
       digit → the string character tapped, e.g. '2'
 
       Adds the digit to currentPIN and updates the dots.
       When PIN reaches 5 digits, automatically checks it.
    ────────────────────────────────────────────────────────── */
    function addDigit(digit) {
      /* Don't accept more than 5 digits */
      if (currentPIN.length >= 5) return;
 
      /* Add the tapped digit to our PIN string */
      currentPIN += digit;
 
      /* Update the visual dots to reflect new length */
      updateDots();
 
      /* If we now have all 5 digits, check the PIN */
      if (currentPIN.length === 5) {
        checkPIN();
      }
    }
 
    /* ── deleteDigit ─────────────────────────────────────────
       Called when the ⌫ (backspace) key is tapped.
       Removes the last digit from currentPIN and updates dots.
       .slice(0, -1) removes the last character of a string.
    ────────────────────────────────────────────────────────── */
    function deleteDigit() {
      currentPIN = currentPIN.slice(0, -1);
      updateDots();
      /* Clear any error message when user starts correcting */
      document.getElementById('pin-error').textContent = '';
      document.getElementById('pin-dots').classList.remove('error');
    }
 
    /* ── updateDots ──────────────────────────────────────────
       Updates the five dot visuals to match how many digits
       have been entered. Called after every digit add/delete.
 
       Loops through all five dots and adds the 'filled' class
       to dots whose index is less than the current PIN length.
 
       Example: PIN is '226' (length 3)
         dot index 0 → 0 < 3 → filled ✅
         dot index 1 → 1 < 3 → filled ✅
         dot index 2 → 2 < 3 → filled ✅
         dot index 3 → 3 < 3 → false → not filled ○
         dot index 4 → 4 < 3 → false → not filled ○
    ────────────────────────────────────────────────────────── */
    function updateDots() {
      const dots = document.querySelectorAll('.pin-dot');
      dots.forEach((dot, index) => {
        if (index < currentPIN.length) {
          dot.classList.add('filled');
        } else {
          dot.classList.remove('filled');
        }
      });
    }
 
    /* ── checkPIN ────────────────────────────────────────────
       Called automatically when the 5th digit is entered.
       Compares the entered PIN against what is stored in
       Supabase for this user.
 
       If correct → save session → go to dashboard
       If wrong   → shake dots → show error → reset PIN
    ────────────────────────────────────────────────────────── */
    async function checkPIN() {
      /* Compare entered PIN to stored PIN
         Both are strings so === comparison works directly
         currentUser.pin comes from the Supabase users table */
      if (currentPIN === currentUser.pin) {
 
        /* ── CORRECT PIN ───────────────────────────────────
           Save the session to localStorage so the user stays
           logged in even after closing and reopening the app.
 
           We store a JSON string containing:
             name         → 'cole' or 'maggie' (for database queries)
             display_name → 'Cole' or 'Maggie' (for UI display)
             color        → their accent color (for personalization)
 
           JSON.stringify() converts the object to a string
           because localStorage can only store strings.
        ─────────────────────────────────────────────────── */
        localStorage.setItem('fh_user', JSON.stringify({
          name:         currentUser.name,
          display_name: currentUser.display_name,
          color:        currentUser.color
        }));
 
        /* Send them to the home dashboard
           replace() prevents the login page appearing
           in browser history so back button doesn't return here */
        window.location.replace('../index.html');
 
      } else {
 
        /* ── WRONG PIN ─────────────────────────────────────
           Trigger the shake animation on the dots container
           by adding the 'error' class. The CSS animation
           defined above runs automatically when this class
           is present.
 
           setTimeout removes the class after the animation
           completes (400ms) so it can trigger again next time.
        ─────────────────────────────────────────────────── */
        const dotsEl = document.getElementById('pin-dots');
        dotsEl.classList.add('error');
        setTimeout(() => dotsEl.classList.remove('error'), 400);
 
        /* Show the error message */
        document.getElementById('pin-error').textContent = 'Incorrect PIN — try again';
 
        /* Reset the PIN string and dots after a short delay
           so the user sees the shake before dots clear */
        setTimeout(() => {
          currentPIN = '';
          updateDots();
        }, 400);
      }
    }
 
    /* ── goBack ──────────────────────────────────────────────
       Called when the "← Back" button is tapped.
       Resets all state and returns to the user selection view.
    ────────────────────────────────────────────────────────── */
    function goBack() {
      /* Clear all PIN state */
      currentUser = null;
      currentPIN  = '';
      updateDots();
 
      /* Clear any error messages */
      document.getElementById('pin-error').textContent = '';
      document.getElementById('pin-dots').classList.remove('error');
 
      /* Swap views back to user selection */
      document.getElementById('user-select').style.display = 'block';
      document.getElementById('pin-section').style.display  = 'none';
    }
 
    /* ── ASSIGN FUNCTIONS TO WINDOW ──────────────────────────
       Because this script uses type="module", functions
       defined inside it are scoped to the module and NOT
       automatically global. The onclick= attributes in our
       HTML need global functions, so we explicitly attach
       each function to the window object here.
    ────────────────────────────────────────────────────────── */
    window.selectUser  = selectUser;
    window.addDigit    = addDigit;
    window.deleteDigit = deleteDigit;
    window.goBack      = goBack;
 
  </script>
 
</body>
</html>
